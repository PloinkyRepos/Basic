name: Publish bwrap-runner image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-bwrap-runner.yml
      - bwrap-runner/Dockerfile
      - bwrap-runner/scripts/build-image.sh
      - bwrap-runner/manifest.json

permissions:
  contents: read

concurrency:
  group: publish-bwrap-runner-image
  cancel-in-progress: false

env:
  IMAGE_NAME: assistos/bwrap-runner
  IMAGE_TAG: node24-bookworm

jobs:
  publish:
    name: Build and push Docker Hub image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: assistos
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=${{ env.IMAGE_TAG }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bwrap-runner
          file: ./bwrap-runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
